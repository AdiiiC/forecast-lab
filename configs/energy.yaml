dataset:
  name: electricity_hourly
  target: load_mw
  freq: H
  season_length: 168          # weekly seasonality on hourly data

backtest:
  horizon: 24                 # forecast 24h ahead
  n_folds: 8
  stride: 168                 # roll origin forward 1 week per fold
  min_train_size: 4320        # ~6 months warmup
  mode: rolling               # rolling | expanding

intervals:
  alpha: 0.1                  # 90% PI
  conformal: true             # wrap point models with split-conformal
  calibration_size: 336       # 2 weeks held out from train for conformal calibration

models:
  - {name: seasonal_naive}
  - {name: arima,    order: [2,1,2], seasonal_order: [1,1,1,24]}
  - {name: prophet,  weekly: true, daily: true, yearly: false}
  - {name: lightgbm, lags: [1,2,3,24,25,48,168,336], n_estimators: 800, learning_rate: 0.05, num_leaves: 64}
  - {name: nbeats,   input_size: 168, hidden: 256, stacks: 3, blocks: 3, epochs: 30, batch_size: 256, dropout: 0.1}

output_dir: runs/energy
seed: 7