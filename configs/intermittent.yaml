dataset:
  name: electricity_hourly       # any series; for true intermittent use a sparse one
  freq: H
  season_length: 168

preprocess:
  enabled: true
  kalman: true
  outliers: stl
  changepoints: true

backtest:
  horizon: 24
  n_folds: 8
  stride: 168
  min_train_size: 4320
  mode: rolling

intervals:
  alpha: 0.1
  conformal: true
  calibration_size: 336

models:
  - {name: seasonal_naive}
  - {name: croston, alpha: 0.1, variant: sba}
  - {name: tsb,     alpha_p: 0.1, alpha_z: 0.1}
  - {name: adida,   agg: 24, alpha: 0.2}
  - {name: lightgbm, lags: [1, 24, 168], n_estimators: 400}

decisions:
  newsvendor: {c_under: 3.0, c_over: 1.0}   # stockouts hurt 3× more than overstock
  safety_stock: {lead_time: 6, service_level: 0.95}
  dispatch:    {capacity: 90.0, risk_alpha: 0.1}

output_dir: runs/intermittent
seed: 7